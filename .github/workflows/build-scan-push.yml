name: Build, Scan and Push Voting App Images
on:
  push:
    branches: [main]
jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [vote, result, worker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/voting-${{ matrix.service }}:latest \
            ./${{ matrix.service }}

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/voting-${{ matrix.service }}:latest

      - name: Scan with Sysdig
        id: scan
        uses: sysdiglabs/scan-action@v6
        with:
          image-tag: ${{ secrets.DOCKERHUB_USERNAME }}/voting-${{ matrix.service }}:latest
          sysdig-secure-token: ${{ secrets.SYSDIG_SECURE_TOKEN }}
          sysdig-secure-url: https://us4.app.sysdig.com
          #set to true if you expect no issues with image
          stop-on-failed-policy-eval: false
          stop-on-processing-error: false
